<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}文档脱敏工具{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #eef3f8;
            --panel: #ffffff;
            --ink: #1f2937;
            --muted: #5b6472;
            --line: #d8e1ea;
            --brand: #0f766e;
            --brand-deep: #115e59;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
                linear-gradient(180deg, #f7fafc 0%, var(--bg) 100%);
            color: var(--ink);
        }

        .app-shell {
            max-width: 980px;
        }

        .hero-card,
        .panel-card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(216, 225, 234, 0.9);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(10px);
        }

        .hero-card {
            overflow: hidden;
            position: relative;
        }

        .hero-card::after {
            content: "";
            position: absolute;
            inset: auto -80px -80px auto;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.18), transparent 70%);
        }

        .muted-text {
            color: var(--muted);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .field-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .field-item {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 16px;
            background: #f9fbfc;
        }

        .btn-brand {
            background: var(--brand);
            border-color: var(--brand);
        }

        .btn-brand:hover,
        .btn-brand:focus {
            background: var(--brand-deep);
            border-color: var(--brand-deep);
        }

        .tips-list {
            padding-left: 1rem;
            margin-bottom: 0;
            color: var(--muted);
        }

        .upload-box {
            border: 1.5px dashed #9fb4c8;
            border-radius: 18px;
            background: linear-gradient(180deg, #fcfeff 0%, #f3f8fb 100%);
        }
    </style>
</head>
<body>
<main class="container py-5 app-shell">
    {% block content %}{% endblock %}
</main>
</body>
</html>
